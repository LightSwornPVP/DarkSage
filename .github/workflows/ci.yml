name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # actions/checkout v4.4.0 (the current commit the mutable "v4" tag resolves to as of 2026-07-22)
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 0
      # gitleaks-action v2.3.9 (latest explicitly tagged 2.x release as of 2026-07-22).
      # On a push event this scans the pushed commits; on a pull_request event it scans the
      # PR diff against base. fetch-depth: 0 makes full history available to the action but
      # does not itself force a full-history scan on every run — see docs/secret-scanning.md
      # for how to run a guaranteed full-history scan.
      - name: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_VERSION: "8.30.1"

  foundation-checks:
    name: Foundation checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write # required for reviewdog's github-check reporter to post a Check Run
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      # actionlint v1.73.0 — validates this workflow file's own syntax and common mistakes
      # reporter: github-check posts via the Checks API against the commit SHA, not a PR —
      # unlike github-pr-check/github-pr-review, it behaves identically on push and pull_request.
      # fail_level: error makes this step (and therefore the job) exit non-zero on any lint error,
      # regardless of event type or reporter.
      - name: Lint workflow syntax
        uses: reviewdog/action-actionlint@50842263c20a7c46bd0065b9e624d3c569db061e # v1.73.0
        with:
          reporter: github-check
          fail_level: error

      # lychee-action v2.9.0 — actively maintained link checker; replaces the archived
      # gaurav-nelson/github-action-markdown-link-check
      - name: Check markdown links
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: --config .github/lychee.toml "*.md" "**/*.md"
          fail: true

      - name: Run foundation verification checks
        run: bash scripts/verify-foundation.sh

